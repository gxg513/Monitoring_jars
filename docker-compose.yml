version: '3.3'
services:
   php-apache-environment:
     container_name: php-apache
     build: ./php
     volumes:
       - ./php/src:/var/www/html/
     ports:
       - 8000:80
   db:
     container_name: db
     build: ./mysql
     restart: always
     environment:
       MYSQL_ROOT_PASSWORD: root
       MYSQL_DATABASE: mydb
       MYSQL_USER: razvan
       MYSQL_PASSWORD: razvan
     ports:
       - "3306:3306"
